<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="3" fill="white" opacity="0.7"/>
  <circle cx="200" cy="40" r="2" fill="white" opacity="0.5"/>
  <circle cx="400" cy="80" r="3" fill="white" opacity="0.6"/>
  <circle cx="440" cy="160" r="2" fill="white" opacity="0.4"/>
  <circle cx="50" cy="200" r="2" fill="white" opacity="0.5"/>
  <circle cx="460" cy="300" r="3" fill="white" opacity="0.6"/>
  <circle cx="120" cy="380" r="2" fill="white" opacity="0.4"/>
  <circle cx="350" cy="420" r="3" fill="white" opacity="0.5"/>
  <!-- Rocket body -->
  <path d="M 256 80 Q 300 100 320 200 L 320 360 Q 320 380 256 400 Q 192 380 192 360 L 192 200 Q 212 100 256 80 Z"
    fill="#0a2040" stroke="#00f0ff" stroke-width="4" filter="url(#glow)"/>
  <!-- Rocket nose -->
  <path d="M 256 80 Q 300 100 320 200 L 192 200 Q 212 100 256 80 Z" fill="#00a0cc" opacity="0.8"/>
  <!-- Cockpit window -->
  <ellipse cx="256" cy="220" rx="36" ry="40" fill="#00f0ff" opacity="0.15" filter="url(#glow)"/>
  <ellipse cx="256" cy="220" rx="30" ry="34" fill="#001428" stroke="#00f0ff" stroke-width="3"/>
  <ellipse cx="256" cy="220" rx="20" ry="24" fill="#00f0ff" opacity="0.3" filter="url(#glow)"/>
  <!-- Fins -->
  <path d="M 192 320 L 140 400 L 192 360 Z" fill="#004060" stroke="#00f0ff" stroke-width="2"/>
  <path d="M 320 320 L 372 400 L 320 360 Z" fill="#004060" stroke="#00f0ff" stroke-width="2"/>
  <!-- Exhaust flames -->
  <ellipse cx="230" cy="410" rx="18" ry="30" fill="#ff6b35" opacity="0.9" filter="url(#glow)"/>
  <ellipse cx="282" cy="410" rx="18" ry="30" fill="#ff6b35" opacity="0.9" filter="url(#glow)"/>
  <ellipse cx="256" cy="420" rx="26" ry="40" fill="#ff8844" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="256" cy="430" rx="16" ry="30" fill="#ffcc44" opacity="0.8" filter="url(#glow)"/>
  <!-- Glow -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.2" filter="url(#glow)"/>
</svg>
